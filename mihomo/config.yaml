proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 手动切换
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - DIRECT

  - name: 🚀 手动切换
    type: select
    include-all: true

  - name: ♻️ 自动选择
    type: url-test
    use:
      - airport
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🛟 节点容灾
    type: fallback
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇭🇰 香港节点
    type: url-test
    use:
      - airport
    filter: "(港|HK|hk|Hong Kong|HongKong|hongkong)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇨🇳 台湾节点
    type: url-test
    use:
      - airport
    filter: "(台|新北|彰化|TW|Taiwan)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇸🇬 狮城节点
    type: url-test
    use:
      - airport
    filter: "(新加坡|坡|狮城|SG|Singapore)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇯🇵 日本节点
    type: url-test
    use:
      - airport
    filter: "(日本|东京|大阪|埼玉|JP|Japan)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇺🇲 美国节点
    type: url-test
    use:
      - airport
    filter: "(美|洛杉矶|西雅图|硅谷|US|United States)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100

  - name: 🇰🇷 韩国节点
    type: url-test
    use:
      - airport
    filter: "(KR|Korea|KOR|首尔|韩|韓)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🛟 节点容灾

  - name: 🔒 隐私保护
    type: select
    proxies:
      - DIRECT
      - REJECT
      - 🛟 节点容灾

  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 🍃 应用净化
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 📢 谷歌FCM
    type: select
    proxies:
      - 🎯 全球直连
      - 🛟 节点容灾

  - name: Ⓜ️ 微软云盘
    type: select
    proxies:
      - 🎯 全球直连
      - 🛟 节点容灾

  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - 🎯 全球直连
      - 🛟 节点容灾

  - name: 🍎 苹果服务
    type: select
    proxies:
      - 🎯 全球直连
      - 🛟 节点容灾

  - name: 📲 电报消息
    type: select
    proxies:
      - 🛟 节点容灾
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇺🇲 美国节点

  - name: 💬 Ai应用
    type: select
    proxies:
      - 🇸🇬 狮城节点
      - 🛟 节点容灾
      - 🇺🇲 美国节点
      - 🇯🇵 日本节点

  - name: 🎶 网易音乐
    type: select
    proxies:
      - 🎯 全球直连
      - 🛟 节点容灾

  - name: 🎮 游戏平台
    type: select
    proxies:
      - 🎯 全球直连
      - 🛟 节点容灾

  - name: 📹 油管视频
    type: select
    proxies:
      - 🛟 节点容灾
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇺🇲 美国节点

  - name: 🎥 奈飞视频
    type: select
    proxies:
      - 🛟 节点容灾
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇺🇲 美国节点

  - name: 📺 巴哈姆特
    type: select
    proxies:
      - 🇨🇳 台湾节点
      - 🛟 节点容灾

  - name: 📺 哔哩哔哩
    type: select
    proxies:
      - 🎯 全球直连
      - 🇨🇳 台湾节点
      - 🇭🇰 香港节点

  - name: 🌏 国内媒体
    type: select
    proxies:
      - 🎯 全球直连
      - 🛟 节点容灾

  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🛟 节点容灾
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇺🇲 美国节点

  - name: 🐙 GITHUB
    type: select
    proxies:
      - 🛟 节点容灾
      - 🎯 全球直连

  - name: 🖼️ Imgur
    type: select
    proxies:
      - 🛟 节点容灾
      - 🇺🇲 美国节点

  - name: 🎬 EMBY
    type: select
    proxies:
      - 🛟 节点容灾
