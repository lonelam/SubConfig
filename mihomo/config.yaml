mixed-port: 7890
socks-port: 7891
allow-lan: true
bind-address: "*"
ipv6: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
unified-delay: true

profile:
  store-selected: true
  store-fake-ip: true

proxies:
  - name: Debugging
    type: socks5
    server: 127.0.0.1
    port: 9000

proxy-providers:
  airport:
    type: http
    url: "__SUBSCRIBE_URL__"
    path: ./providers/airport.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
    exclude-filter: "(跳转域名|到期|请先购买|剩余流量|时间|官网|产品|平台|每月刷新|一元机场.ink|管人痴|下次重置剩余)"

